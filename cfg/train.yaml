root_dir: data/eds/processed
val_root_dir: data/eds/processed_validation
b_size: 4
val_split: 0.1
clip_len: 3
delta_t_ms: 50
num_bins: 5
downsampling_factor: 1.0
denoising: false
denoise_dt_us: 1000
denoise_radius: 1
denoise_min_supporters: 1
denoise_same_polarity_only: false
derotate: false
derotation_slices: 100
precomputed_voxels: true
voxel_filename: derotated_voxels.npy
optimizer: AdamW
lr: 1.0e-5
momentum: 0.9
weight_decay: 1.0e-4
epoch: 100
pretrained_ViT: false
num_workers: 0
persistent_workers: true
prefetch_factor: 2
amp: false
amp_dtype: bfloat16
profile_timing: false
profile_warmup_batches: 10
checkpoint_path: checkpoints
checkpoint:
embed_dim: 384
patch_size: 16
attention_type: divided_space_time
depth: 6
heads: 6
dim_head: 64
attn_dropout: 0.1
ff_dropout: 0.1
time_only: false
